  <script>
    (function(){
      var slug = 'amazon';
      var target = 'https://amzn.to/4m67lep';
      var debug = new URLSearchParams(location.search).has('debug');

      // Envia evento para GTM
      if (window.dataLayer) {
        window.dataLayer.push({
          event: 'affiliate_click',
          affiliate_slug: slug,
          target_url: target,
          page_path: location.pathname
        });
      }

      // Atualiza o link manual
      var outLink = document.getElementById('out');
      if (outLink) {
        outLink.href = target;
      }

      // Redireciona automaticamente se não estiver em modo debug
      if (!debug) {
        setTimeout(function(){
          try {
            window.location.href = target;
          } catch(e) {
            console.error('Erro ao redirecionar:', e);
            // Fallback para window.open se location.href falhar
            window.open(target, '_self');
          }
        }, 500);
      }
    })();
  </script>
